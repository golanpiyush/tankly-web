<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="description" content="Tankly Feedback — Submit a feature request, improvement, or bug report."/>
<title>Tankly — Feedback Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet"/>
<style>
:root{
  --ink:#04080f;--ink2:#070d18;--surface:#0a1220;
  --panel:rgba(9,17,30,0.75);--panel2:rgba(12,21,38,0.88);
  --edge:rgba(0,196,168,0.10);--edge2:rgba(255,255,255,0.058);
  --teal:#00c4a8;--teal2:#6edcd0;--teal3:rgba(0,196,168,0.13);
  --slate:#8fa8bc;--slate2:#4a6880;--white:#e8f4f0;--white2:#f4faf8;
  --purple:#8b5cf6;--amber:#f59e0b;--blue:#3b82f6;--rose:#f43f5e;
  --r-sm:8px;--r:14px;--r-lg:20px;--r-xl:28px;--fam:'Cabin',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{background:var(--ink);color:var(--slate);font-family:var(--fam);font-size:15px;line-height:1.75;overflow-x:hidden;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}
button{font-family:var(--fam);cursor:pointer;border:none;background:none}

/* Canvas + bubbles */
#hero-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.40}
.bubble-layer{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.bbl{position:absolute;bottom:-50px;border-radius:50%;border:1px solid rgba(0,196,168,0.20);opacity:0;animation:bblRise linear infinite}
.b1{left:4%;width:7px;height:7px;animation-duration:21s;animation-delay:0s}
.b2{left:14%;width:4px;height:4px;animation-duration:27s;animation-delay:5s}
.b3{left:25%;width:10px;height:10px;animation-duration:20s;animation-delay:9s}
.b4{left:37%;width:5px;height:5px;animation-duration:30s;animation-delay:3s}
.b5{left:52%;width:8px;height:8px;animation-duration:22s;animation-delay:7s}
.b6{left:64%;width:4px;height:4px;animation-duration:26s;animation-delay:12s}
.b7{left:76%;width:11px;height:11px;animation-duration:18s;animation-delay:2s}
.b8{left:88%;width:6px;height:6px;animation-duration:24s;animation-delay:10s}
@keyframes bblRise{0%{transform:translateY(0);opacity:0}5%{opacity:1}92%{opacity:0.3}100%{transform:translateY(-110vh) translateX(16px);opacity:0}}

/* Nav */
nav{position:fixed;top:0;left:0;right:0;z-index:400;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1.25rem,5vw,3rem);background:rgba(4,8,15,0.55);backdrop-filter:blur(22px) saturate(1.4);-webkit-backdrop-filter:blur(22px) saturate(1.4);border-bottom:1px solid var(--edge);transition:background 0.3s}
nav.scrolled{background:rgba(4,8,15,0.92)}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(140deg,#00c4a8,#0a7d6e);display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 0 16px rgba(0,196,168,0.32);flex-shrink:0}
.nav-wordmark{font-family:var(--fam);font-weight:700;font-size:17px;color:var(--white);letter-spacing:-0.02em}
.nav-links{display:flex;align-items:center;gap:2px}
.nav-link{padding:6px 13px;border-radius:8px;font-size:13px;font-weight:600;color:var(--slate);transition:color 0.2s,background 0.2s}
.nav-link:hover{color:var(--white);background:rgba(255,255,255,0.05)}
.nav-cta{margin-left:8px;padding:7px 17px;border-radius:9px;font-size:13px;font-weight:700;color:#040b10;background:var(--teal);box-shadow:0 0 20px rgba(0,196,168,0.26);transition:box-shadow 0.2s,transform 0.15s,background 0.2s}
.nav-cta:hover{background:var(--teal2);box-shadow:0 0 32px rgba(0,196,168,0.45);transform:translateY(-1px)}
.nav-hamburger{display:none;flex-direction:column;gap:5px;padding:6px}
.nav-hamburger span{display:block;width:22px;height:1.5px;background:var(--slate);border-radius:999px}
@media(max-width:768px){.nav-links{display:none}.nav-hamburger{display:flex}}
.mobile-menu{display:none;position:fixed;top:60px;left:0;right:0;background:rgba(4,8,15,0.97);backdrop-filter:blur(24px);border-bottom:1px solid var(--edge2);z-index:399;padding:1rem 1.5rem 1.5rem;flex-direction:column;gap:0.2rem}
.mobile-menu.open{display:flex}
.mobile-menu a{font-size:15px;font-weight:600;color:var(--slate);padding:10px 0;border-bottom:1px solid var(--edge2);transition:color 0.2s}
.mobile-menu a:last-child{border-bottom:none}
.mobile-menu a:hover{color:var(--teal)}

/* Page layout */
.page{flex:1;display:flex;align-items:center;justify-content:center;padding:90px clamp(1.25rem,5vw,3rem) 4rem;position:relative;z-index:2}
.stage{width:100%;max-width:560px;margin:0 auto}

/* Reveals */
.js-fade{opacity:0;transform:translateY(20px);transition:opacity 0.65s ease,transform 0.65s ease}
.js-fade.in{opacity:1;transform:translateY(0)}

/* Brand header */
.brand-row{display:flex;align-items:center;gap:12px;margin-bottom:1.8rem}
.brand-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(140deg,#00c4a8,#0a7d6e);display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 22px rgba(0,196,168,0.30);flex-shrink:0}
.brand-name{font-family:var(--fam);font-weight:700;font-size:1.55rem;color:var(--white);letter-spacing:-0.02em}
.brand-sub{font-size:12px;color:var(--slate2);margin-top:1px}

/* Eyebrow */
.eyebrow{display:inline-flex;align-items:center;gap:8px;background:rgba(0,196,168,0.07);border:1px solid rgba(0,196,168,0.20);border-radius:999px;padding:5px 14px;font-size:11px;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:var(--teal);margin-bottom:1.4rem;backdrop-filter:blur(8px)}
.eyebrow-dot{width:5px;height:5px;background:var(--teal);border-radius:50%;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}

/* User chip */
.user-chip{
  display:flex;align-items:center;gap:0.8rem;
  background:rgba(0,196,168,0.04);border:1px solid rgba(0,196,168,0.12);
  border-radius:var(--r-lg);padding:0.9rem 1.1rem;margin-bottom:1.5rem;
  position:relative;overflow:hidden;
}
/* shimmer overlay while loading */
.user-chip.loading::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(0,196,168,0.06) 50%,transparent 100%);
  background-size:200% 100%;animation:skelAnim 1.4s ease infinite;
}
@keyframes skelAnim{0%{background-position:200% 0}100%{background-position:-200% 0}}
.user-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--teal),#0a7d6e);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-weight:700;font-size:0.9rem;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-meta{font-size:0.72rem;color:var(--slate2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-version{background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.22);border-radius:6px;padding:3px 8px;font-size:0.7rem;font-weight:700;color:#c4b5fd;flex-shrink:0}

/* Type pills */
.type-row{display:flex;gap:0.55rem;margin-bottom:1.4rem}
.type-pill{
  flex:1;background:rgba(255,255,255,0.03);border:1.5px solid var(--edge2);
  border-radius:var(--r-lg);padding:0.8rem 0.75rem;
  display:flex;align-items:center;justify-content:center;gap:0.5rem;
  cursor:pointer;transition:all 0.22s;color:var(--slate);font-weight:600;font-size:0.85rem;text-align:center;
}
.type-pill .pill-icon{font-size:1.2rem}
.type-pill:hover:not(.active){border-color:rgba(0,196,168,0.3);background:rgba(0,196,168,0.04);color:var(--white)}
.type-pill.active{background:rgba(0,196,168,0.10);border-color:var(--teal);box-shadow:0 0 16px rgba(0,196,168,0.18);color:var(--white);font-weight:700}
.type-pill.active.type-improve{background:rgba(59,130,246,0.10);border-color:var(--blue);box-shadow:0 0 16px rgba(59,130,246,0.18)}
.type-pill.active.type-bug{background:rgba(244,63,94,0.10);border-color:var(--rose);box-shadow:0 0 16px rgba(244,63,94,0.18)}
@media(max-width:420px){.type-pill span:not(.pill-icon){display:none}.type-pill{padding:0.8rem}}

/* Inputs */
.input-group{margin-bottom:1.1rem}
.input-label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--slate2);margin-bottom:0.4rem}
textarea{
  width:100%;background:rgba(255,255,255,0.025);border:1px solid var(--edge2);
  border-radius:12px;padding:12px 15px;font-size:14px;color:var(--white);
  font-family:var(--fam);outline:none;resize:vertical;min-height:138px;
  transition:border-color 0.2s,box-shadow 0.2s,background 0.2s;
  line-height:1.7;
}
textarea::placeholder{color:var(--slate2)}
textarea:focus{border-color:rgba(0,196,168,0.45);box-shadow:0 0 0 3px rgba(0,196,168,0.08);background:rgba(0,196,168,0.025)}
textarea.ta-improve:focus{border-color:rgba(59,130,246,0.45);box-shadow:0 0 0 3px rgba(59,130,246,0.08)}
textarea.ta-bug:focus{border-color:rgba(244,63,94,0.45);box-shadow:0 0 0 3px rgba(244,63,94,0.08)}

/* Submit button */
.btn-submit{
  width:100%;padding:13px;border-radius:12px;
  background:linear-gradient(130deg,var(--teal),#0a9e88);
  color:#040b10;font-family:var(--fam);font-weight:700;font-size:14px;
  border:none;cursor:pointer;
  box-shadow:0 8px 28px -4px rgba(0,196,168,0.30);
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all 0.25s;margin-top:0.4rem;
}
.btn-submit:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 12px 36px -4px rgba(0,196,168,0.46)}
.btn-submit:active:not(:disabled){transform:scale(0.98)}
.btn-submit:disabled{opacity:0.55;cursor:not-allowed}
.btn-submit.btn-improve{background:linear-gradient(130deg,var(--blue),#1d4ed8);color:#fff;box-shadow:0 8px 28px -4px rgba(59,130,246,0.30)}
.btn-submit.btn-improve:hover:not(:disabled){box-shadow:0 12px 36px -4px rgba(59,130,246,0.46)}
.btn-submit.btn-bug{background:linear-gradient(130deg,var(--rose),#be123c);color:#fff;box-shadow:0 8px 28px -4px rgba(244,63,94,0.30)}
.btn-submit.btn-bug:hover:not(:disabled){box-shadow:0 12px 36px -4px rgba(244,63,94,0.46)}

.btn-spinner{width:16px;height:16px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin 0.7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* Message */
.msg-box{margin-top:1rem;padding:0.9rem 1.1rem;border-radius:10px;text-align:center;font-weight:600;font-size:13px;display:none}
.msg-box.ok{background:rgba(0,196,168,0.08);border:1px solid rgba(0,196,168,0.20);color:var(--teal);display:block}
.msg-box.err{background:rgba(244,63,94,0.08);border:1px solid rgba(244,63,94,0.20);color:#fda4af;display:block}

/* Anon notice */
.anon-notice{font-size:11.5px;color:var(--slate2);text-align:center;padding:0.4rem 0 0.2rem;display:none}
.anon-notice.show{display:block}

footer{position:relative;z-index:2;border-top:1px solid var(--edge2);padding:1.6rem clamp(1.25rem,5vw,3rem);margin-top:auto}
.footer-inner{max-width:560px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.7rem;font-size:11.5px;color:var(--slate2)}
.footer-links{display:flex;gap:1.1rem;flex-wrap:wrap}
.footer-links a{color:var(--slate2);transition:color 0.2s}
.footer-links a:hover{color:var(--teal)}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important}}
:focus-visible{outline:2px solid var(--teal);outline-offset:3px;border-radius:4px}
</style>
</head>
<body>

<canvas id="hero-canvas"></canvas>
<div class="bubble-layer" aria-hidden="true">
  <span class="bbl b1"></span><span class="bbl b2"></span><span class="bbl b3"></span>
  <span class="bbl b4"></span><span class="bbl b5"></span><span class="bbl b6"></span>
  <span class="bbl b7"></span><span class="bbl b8"></span>
</div>

<nav id="nav" role="navigation" aria-label="Main navigation">
  <a class="nav-brand" href="index.html" aria-label="Tankly home">
    <div class="nav-logo" aria-hidden="true">🐠</div>
    <span class="nav-wordmark">Tankly</span>
  </a>
  <div class="nav-links" id="navLinks">
    <a class="nav-link" href="index.html#features">Features</a>
    <a class="nav-link" href="tankly-privacy">Privacy</a>
    <a class="nav-link" href="tankly-tos">Terms</a>
    <a class="nav-cta" href="index.html">← Back to Tankly</a>
  </div>
  <button class="nav-hamburger" id="hamburgerBtn" aria-label="Open menu" aria-expanded="false" aria-controls="mobileMenu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="mobile-menu" id="mobileMenu" role="dialog" aria-label="Mobile navigation" aria-hidden="true">
  <a href="index.html#features">Features</a>
  <a href="tankly-privacy">Privacy</a>
  <a href="tankly-tos">Terms</a>
  <a href="index.html">← Back to Tankly</a>
</div>

<div class="page">
  <div class="stage">

    <div class="js-fade" data-delay="0">
      <div class="brand-row">
        <div class="brand-icon" aria-hidden="true">🐠</div>
        <div>
          <div class="brand-name">Tankly</div>
          <div class="brand-sub">Feedback Portal</div>
        </div>
      </div>
      <div class="eyebrow"><span class="eyebrow-dot"></span>Help us improve</div>
    </div>

    <!-- User chip (populated from URL params) -->
    <div class="user-chip loading js-fade" id="userChip" data-delay="80" aria-label="Submitting as">
      <div class="user-avatar" aria-hidden="true">🐠</div>
      <div class="user-info">
        <div class="user-name" id="chipName">Loading…</div>
        <div class="user-meta" id="chipMeta">—</div>
      </div>
      <div class="user-version" id="chipVersion">—</div>
    </div>
    <div class="anon-notice" id="anonNotice">Sign in to Tankly for your account details to appear automatically.</div>

    <!-- Type selector -->
    <div class="type-row js-fade" id="typeSelector" data-delay="140" role="group" aria-label="Feedback type">
      <button class="type-pill active" data-type="feature" aria-pressed="true">
        <span class="pill-icon" aria-hidden="true">💡</span><span>Feature</span>
      </button>
      <button class="type-pill type-improve" data-type="improvement" aria-pressed="false">
        <span class="pill-icon" aria-hidden="true">🔧</span><span>Improve</span>
      </button>
      <button class="type-pill type-bug" data-type="bug" aria-pressed="false">
        <span class="pill-icon" aria-hidden="true">🐛</span><span>Bug</span>
      </button>
    </div>

    <form id="requestForm" novalidate>
      <input type="hidden" id="requestType" value="feature"/>

      <div class="input-group js-fade" data-delay="190">
        <label class="input-label" id="detailLabel" for="detailsTA">💡 Describe your feature idea</label>
        <textarea id="detailsTA" placeholder="e.g. A feeding schedule widget with daily reminders…" required></textarea>
      </div>

      <div class="js-fade" data-delay="230">
        <button type="submit" class="btn-submit" id="submitBtn">
          <span id="submitBtnText">🚀 Send Feature Request</span>
          <div class="btn-spinner" id="btnSpinner"></div>
        </button>
        <div class="msg-box" id="msgBox"></div>
      </div>
    </form>

  </div>
</div>

<footer>
  <div class="footer-inner">
    <span>© 2026 Tankly · Piyush Golan</span>
    <div class="footer-links">
      <a href="tankly-privacy">Privacy</a>
      <a href="tankly-tos">Terms</a>
      <a href="mailto:golanlabs.apps@gmail.com">Contact</a>
    </div>
  </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>
<script>
/* Supabase injected by build.js */
const SB_URL  = '__SUPABASE_URL__';
const SB_ANON = '__SUPABASE_ANON_KEY__';

(function(){
  'use strict';

  /* Canvas */
  function initFallbackCanvas(){const canvas=document.getElementById('hero-canvas');if(!canvas)return;const ctx=canvas.getContext('2d');let W,H,t=0,raf;const dots=[];function init(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;dots.length=0;const n=Math.floor(W*H/10000);for(let i=0;i<n;i++)dots.push({x:Math.random()*W,y:Math.random()*H,r:0.5+Math.random()*1.4,sp:0.3+Math.random()*0.6,ph:Math.random()*Math.PI*2});}init();window.addEventListener('resize',init,{passive:true});function draw(){raf=requestAnimationFrame(draw);ctx.clearRect(0,0,W,H);t+=0.015;dots.forEach(d=>{d.y-=d.sp*0.3;if(d.y<-10){d.y=H+10;d.x=Math.random()*W;}const a=0.04+0.06*(0.5+0.5*Math.sin(t*d.sp+d.ph));ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fillStyle=`rgba(0,196,168,${a})`;ctx.fill();});}draw();document.addEventListener('visibilitychange',()=>{if(document.hidden)cancelAnimationFrame(raf);else draw()});}
  setTimeout(initFallbackCanvas,600);

  /* Nav */
  const nav=document.getElementById('nav');if(nav)window.addEventListener('scroll',()=>nav.classList.toggle('scrolled',window.scrollY>50),{passive:true});
  const hbg=document.getElementById('hamburgerBtn'),mm=document.getElementById('mobileMenu');if(hbg&&mm){hbg.addEventListener('click',()=>{const o=mm.classList.toggle('open');hbg.setAttribute('aria-expanded',String(o));mm.setAttribute('aria-hidden',String(!o));});mm.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{mm.classList.remove('open');hbg.setAttribute('aria-expanded','false');mm.setAttribute('aria-hidden','true');}));document.addEventListener('click',e=>{if(!hbg.contains(e.target)&&!mm.contains(e.target)){mm.classList.remove('open');hbg.setAttribute('aria-expanded','false');mm.setAttribute('aria-hidden','true');}});}

  /* Staggered fade in */
  window.addEventListener('load',()=>{document.querySelectorAll('.js-fade').forEach(el=>{const d=parseInt(el.dataset.delay||0,10);setTimeout(()=>el.classList.add('in'),d);});});

  /* URL params */
  function p(name){return new URL(window.location.href).searchParams.get(name)||'';}
  const USER_NAME    = p('user_name')||p('name')||'';
  const USER_EMAIL   = p('user_email')||p('email')||'';
  const FIREBASE_UID = p('firebase_uid')||p('fb_uid')||'';
  const SUPABASE_UID = p('supabase_uid')||p('sb_uid')||'';
  const APP_VERSION  = p('app_version')||p('version')||'';
  const DEVICE_ID    = p('device_id')||p('device')||'';
  const URL_TYPE     = p('type')||p('request_type')||'';

  /* Populate user chip */
  const chip=document.getElementById('userChip');
  const chipName=document.getElementById('chipName');
  const chipMeta=document.getElementById('chipMeta');
  const chipVersion=document.getElementById('chipVersion');
  const anonNotice=document.getElementById('anonNotice');

  setTimeout(()=>{
    chip.classList.remove('loading');
    if(USER_NAME||USER_EMAIL){
      chipName.textContent=USER_NAME||'Tankly User';
      chipMeta.textContent=USER_EMAIL||(FIREBASE_UID?`uid: ${FIREBASE_UID.slice(0,14)}…`:'—');
      chipVersion.textContent=APP_VERSION?`v${APP_VERSION}`:'—';
    }else{
      chipName.textContent='Anonymous User';
      chipMeta.textContent=FIREBASE_UID?`uid: ${FIREBASE_UID.slice(0,14)}…`:'Not signed in';
      chipVersion.textContent=APP_VERSION?`v${APP_VERSION}`:'—';
      if(!FIREBASE_UID)anonNotice.classList.add('show');
    }
  },500);

  /* Type config */
  const TYPE_CFG={
    feature:{label:'💡 Describe your feature idea',placeholder:'e.g. A feeding schedule widget with daily reminders and portion tracking…',btnText:'🚀 Send Feature Request',btnClass:'',taClass:''},
    improvement:{label:'🔧 What would you improve?',placeholder:'e.g. The parameter chart should support pinch-to-zoom across the full history…',btnText:'🔧 Send Improvement',btnClass:'btn-improve',taClass:'ta-improve'},
    bug:{label:'🐛 Steps to reproduce the bug',placeholder:'1. Opened app\n2. Tapped [screen name]\n3. Expected: …\n4. Actual: …',btnText:'🐛 Report Bug',btnClass:'btn-bug',taClass:'ta-bug'},
  };

  const pills=document.querySelectorAll('.type-pill');
  const typeInput=document.getElementById('requestType');
  const detailLabel=document.getElementById('detailLabel');
  const detailsTA=document.getElementById('detailsTA');
  const submitBtn=document.getElementById('submitBtn');
  const submitBtnText=document.getElementById('submitBtnText');

  function setType(type){
    const cfg=TYPE_CFG[type]||TYPE_CFG.feature;
    typeInput.value=type;
    detailLabel.textContent=cfg.label;
    detailsTA.placeholder=cfg.placeholder;
    detailsTA.className=cfg.taClass;
    submitBtnText.textContent=cfg.btnText;
    submitBtn.className='btn-submit '+cfg.btnClass;
    pills.forEach(pill=>{const on=pill.dataset.type===type;pill.classList.toggle('active',on);pill.setAttribute('aria-pressed',String(on));});
  }

  pills.forEach(pill=>pill.addEventListener('click',()=>setType(pill.dataset.type)));
  if(URL_TYPE&&TYPE_CFG[URL_TYPE])setType(URL_TYPE);else setType('feature');

  /* Submit */
  const form=document.getElementById('requestForm');
  const btnSpinner=document.getElementById('btnSpinner');
  const msgBox=document.getElementById('msgBox');

  form.addEventListener('submit',async e=>{
    e.preventDefault();
    const type=typeInput.value;
    const details=detailsTA.value.trim();
    if(!details){showMsg('Please describe your request before submitting.','err');return;}

    submitBtnText.style.opacity='0.5';btnSpinner.style.display='inline-block';submitBtn.disabled=true;
    msgBox.className='msg-box';msgBox.style.display='none';

    try{
      if(SB_URL&&!SB_URL.includes('__')){
        const res=await fetch(`${SB_URL}/functions/v1/send-feedback`,{
          method:'POST',
          headers:{'Content-Type':'application/json','apikey':SB_ANON,'Authorization':`Bearer ${SB_ANON}`},
          body:JSON.stringify({type,details,user_name:USER_NAME,user_email:USER_EMAIL,firebase_uid:FIREBASE_UID,supabase_uid:SUPABASE_UID,app_version:APP_VERSION,device_id:DEVICE_ID}),
        });
        if(!res.ok)throw new Error(`HTTP ${res.status}`);
        showMsg('✅ Sent! We\'ll review your request soon. Thank you 🐠','ok');
        detailsTA.value='';
      }else{
        throw new Error('No Supabase configured');
      }
    }catch(err){
      console.warn('Edge fn failed, falling back to mailto:',err);
      const flairMap={feature:['💡','Feature Request'],improvement:['🔧','Improvement'],bug:['🐛','Bug Report']};
      const [em,label]=flairMap[type]||flairMap.feature;
      const subject=encodeURIComponent(`[Tankly] ${em} ${label} — ${USER_NAME||'User'}`);
      const body=encodeURIComponent(`${em} ${label}\n\n${details}\n\n---\nName: ${USER_NAME||'N/A'}\nEmail: ${USER_EMAIL||'N/A'}\nFirebase UID: ${FIREBASE_UID||'N/A'}\nSupabase UID: ${SUPABASE_UID||'N/A'}\nVersion: ${APP_VERSION||'N/A'}\nDevice: ${DEVICE_ID||'N/A'}`);
      window.open(`mailto:golanlabs.apps@gmail.com?subject=${subject}&body=${body}`,'_blank');
      showMsg('📬 Email client opened — please send the draft to complete your submission.','ok');
      detailsTA.value='';
    }finally{
      submitBtnText.style.opacity='1';btnSpinner.style.display='none';submitBtn.disabled=false;
    }
  });

  function showMsg(text,type){
    msgBox.textContent=text;msgBox.className=`msg-box ${type}`;
    if(type==='ok')setTimeout(()=>{msgBox.className='msg-box';msgBox.style.display='none';},7000);
  }

  if(window.matchMedia('(prefers-reduced-motion:reduce)').matches){const c=document.getElementById('hero-canvas');if(c)c.style.display='none';document.querySelectorAll('.bbl').forEach(b=>b.style.animation='none');}
})();
</script>
</body>
</html>
